name: cropradar_app
description: AI-powered crop disease detection for farmers — CropRadar backup app.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0          # HTTP client for FastAPI backend
  image_picker: ^1.0.7  # Camera + gallery image selection
  geolocator: ^11.0.0   # GPS location (handles its own permissions)
  flutter_map: ^7.0.1   # OpenStreetMap tiles + circle/marker layers
  latlong2: ^0.9.0      # LatLng coordinate type for flutter_map

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
